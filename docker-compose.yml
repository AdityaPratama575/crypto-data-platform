services:
  airflow-init:
    image: apache/airflow:2.10.0
    container_name: crypto_airflow_init
    env_file:
      - .env
      - .env.docker
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW_UID: "${AIRFLOW_UID:-1000}"
      _PIP_ADDITIONAL_REQUIREMENTS: "pymysql sqlalchemy python-dotenv requests pyyaml tenacity pandas"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./scripts:/opt/airflow/scripts
      - ./sql:/opt/airflow/sql
      - ./config:/opt/airflow/config
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
      - ./.env:/opt/airflow/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    user: "${AIRFLOW_UID:-1000}:0"
    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Aditya
      --lastname Rizky
      --role Admin
      --email admin@example.com
      "

  airflow-postgres:
    image: postgres:16
    container_name: crypto_airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped

  airflow-webserver:
    image: apache/airflow:2.10.0
    container_name: crypto_airflow_webserver
    depends_on:
      - airflow-postgres
    env_file:
      - .env
      - .env.docker
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW_UID: "${AIRFLOW_UID:-1000}"
      PYTHONPATH: /opt/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: "pymysql sqlalchemy python-dotenv requests pyyaml tenacity pandas"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./scripts:/opt/airflow/scripts
      - ./sql:/opt/airflow/sql
      - ./config:/opt/airflow/config
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
      - ./.env:/opt/airflow/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    user: "${AIRFLOW_UID:-1000}:0"
    command: webserver
    ports:
      - "8080:8080"
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.10.0
    container_name: crypto_airflow_scheduler
    depends_on:
      - airflow-postgres
    env_file:
      - .env
      - .env.docker
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "True"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW_UID: "${AIRFLOW_UID:-1000}"
      PYTHONPATH: /opt/airflow
      _PIP_ADDITIONAL_REQUIREMENTS: "pymysql sqlalchemy python-dotenv requests pyyaml tenacity pandas"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./scripts:/opt/airflow/scripts
      - ./sql:/opt/airflow/sql
      - ./config:/opt/airflow/config
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
      - ./.env:/opt/airflow/.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    user: "${AIRFLOW_UID:-1000}:0"
    command: scheduler
    restart: unless-stopped

volumes:
  airflow_postgres_data:
